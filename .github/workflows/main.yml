name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # requirements.txt, could make pyproject.toml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install requirements for ALL services (if they exist)
        find src -name "requirements.txt" -exec pip install -r {} \;
        # Install testing libraries
        pip install pytest pytest-cov requests flake8

    - name: Lint with flake8 (syntax check)
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Unit Tests with Pytest
      run: |
        # This runs all test files (test_*.py) it finds in src/.
        # If NO tests are found, exit code is 5 → we treat it as a warning (not a failure).
        # If tests are found and FAIL, exit code is 1 → pipeline fails.
        pytest src/ --maxfail=1 --disable-warnings -v
        EXIT_CODE=$?
        if [ $EXIT_CODE -eq 5 ]; then
          echo "⚠️ No unit tests found – skipping."
          exit 0
        else
          exit $EXIT_CODE
        fi

    - name: Build Docker images
      run: |
        cd src
        docker compose build
      
    # Containers start and stay healthy
    - name: Smoke Test
      run: |
        cd src
        docker compose up -d
        echo "Waiting 15 seconds for services to initialize"
        sleep 15
        
        # Check that all expected containers are running
        docker ps --filter "status=running" --format "table {{.Names}}" | grep -E "tproc|cnss|cn|postgres"
        
        # curl --fail http://localhost:8000/health || exit 1 (for /health)
        
        echo "All containers are running."
        docker compose down

